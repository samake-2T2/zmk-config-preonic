# Keyboardio Preonic 사용자 설정

# 키보드 이름 설정 (블루투스 검색 시 표시됨, 최대 16자)
CONFIG_ZMK_KEYBOARD_NAME="Preonic"

# 블루투스 성능 최적화
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# RGB Underglow 설정 (하드웨어 지원 시)
CONFIG_ZMK_RGB_UNDERGLOW=y
# 부팅 시 기본 밝기 (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40
# 부팅 시 기본 색상 (Hue 200: 하늘색)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
# 부팅 시 기본 채도 (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=80
# 부팅 시 기본 효과 (2: 숨쉬기 모드 - 부팅 피드백 강화)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
# 효과 속도 조정 (1-5, 낮을수록 느리고 부드러움)
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# LED 절전 설정 (배터리 효율 최적화)
# 키 입력이 없을 때 LED 자동 끄기 (초 단위, 예: 60초)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# USB 연결이 끊겼을 때 LED 자동 끄기
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# 배터리 잔량 보고 활성화
CONFIG_ZMK_BATTERY_REPORTING=y

# 마우스 키 활성화
CONFIG_ZMK_POINTING=y

# NKRO (무한 동시입력) 활성화
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
