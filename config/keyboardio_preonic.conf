# Keyboardio Preonic 사용자 설정

# 키보드 이름 설정 (블루투스 검색 시 표시됨, 최대 16자)
CONFIG_ZMK_KEYBOARD_NAME="Preonic"

# 블루투스 성능 최적화
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# RGB Underglow 설정 (하드웨어 지원 시)
CONFIG_ZMK_RGB_UNDERGLOW=y
# 외부 전원 제어 활성화 (LED 하드웨어 전원 공급 필수)
CONFIG_ZMK_EXT_POWER=y
# 부팅 시 외부 전원 자동 켜기
CONFIG_ZMK_EXT_POWER_BOOT_ON=y
# 부팅 시 기본 색상 및 효과: 하늘색 숨쉬기 (Hue 200, Sat 80, Brt 40, Effect 2)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=80
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# LED 절전 및 유휴 설정 (표준 방식)
# 키 입력이 없을 때 LED 자동 끄기 활성화
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# 전역 유휴 시간 설정 (1분 = 60000ms) - LED 꺼짐과 연동됨
CONFIG_ZMK_IDLE_TIMEOUT=60000

# 배터리 잔량 보고 활성화
CONFIG_ZMK_BATTERY_REPORTING=y

# 마우스 키 활성화
CONFIG_ZMK_POINTING=y

# NKRO (무한 동시입력) 활성화
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
