# Keyboardio Preonic 사용자 설정

# 키보드 이름 설정
CONFIG_ZMK_KEYBOARD_NAME="Preonic"

# 블루투스 성능 최적화
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# [표준 복구] RGB Underglow 기본 설정
CONFIG_ZMK_RGB_UNDERGLOW=y
# 외부 전원과 RGB를 연동하여 하드웨어 전원 공급 보장
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y

# 초기 상태 강제: 하늘색 숨쉬기 (최대 밝기)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# 하드웨어 동작 확인을 위해 자동 꺼짐을 임시로 비활성화
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n

# 기타 표준 설정
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
