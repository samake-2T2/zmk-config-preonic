# Keyboardio Preonic 사용자 설정

# 키보드 이름 설정 (블루투스 검색 시 표시됨, 최대 16자)
CONFIG_ZMK_KEYBOARD_NAME="Preonic"

# 블루투스 성능 최적화
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# RGB Underglow 설정 (하드웨어 지원 시)
CONFIG_ZMK_RGB_UNDERGLOW=y
# 부팅 시 기본 밝기 (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40
# 부팅 시 기본 색상 (Hue 0-359, 200은 부드러운 하늘색)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
# 부팅 시 기본 채도 (0-100)
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=50
# 부팅 시 기본 효과 (1: 정적, 2: 숨쉬기)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1

# 배터리 잔량 보고 활성화
CONFIG_ZMK_BATTERY_REPORTING=y

# 마우스 키 활성화
CONFIG_ZMK_POINTING=y

# NKRO (무한 동시입력) 활성화
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
