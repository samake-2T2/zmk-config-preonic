# Keyboardio Preonic 사용자 설정

# 키보드 이름 설정
CONFIG_ZMK_KEYBOARD_NAME="Preonic"

# 블루투스 성능 최적화 및 호환성 대폭 향상
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y

# [표준 복구] RGB Underglow 기본 설정
CONFIG_ZMK_RGB_UNDERGLOW=y
# 하드웨어 전원 강제 결합 해제 (안정적인 LED 제어를 위해)
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# 초기 상태 강제: 하늘색 숨쉬기 (최대 밝기)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# 절전 설정 (1분 후 자동 꺼짐)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=60000

# 블루투스 페어링 유지를 위해 SETTINGS 기능은 유지하되, 
# 초기값(HUE_START 등)이 우선 적용되도록 함
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
